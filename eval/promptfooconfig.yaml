description: "Agent vs Claude Code CLI — coding capability evaluation"

# Use Bedrock Claude for LLM-rubric grading (not OpenAI)
defaultTest:
  options:
    provider:
      id: "bedrock:us.anthropic.claude-sonnet-4-6"
      config:
        region: "us-east-1"

providers:
  - id: "file://providers/agent_provider.py"
    label: "Auto-Agent (Bedrock)"
    config:
      pythonExecutable: ../.venv/bin/python3
  - id: "file://providers/claude_cli_provider.py"
    label: "Claude Code CLI"
    config:
      pythonExecutable: ../.venv/bin/python3
  # Phase-13 harness — replays a fixture's synthetic_output.json so the
  # eval can exercise ADR-015 deletion-test assertions without requiring
  # Postgres / Redis / Bedrock. The four Phase-13 tests pin this
  # provider via their `providers:` override.
  - id: "file://providers/synthetic_provider.py"
    label: "Synthetic (Phase-13 harness)"
    config:
      pythonExecutable: ../.venv/bin/python3

prompts:
  - "{{task}}"

evaluateOptions:
  maxConcurrency: 4

tests:
  # -------------------------------------------------------------------
  # Test 1: Bug fix — off-by-one pagination + case-sensitive search
  # -------------------------------------------------------------------
  - description: "Fix pagination off-by-one and case-sensitive search bugs"
    vars:
      fixture: "python-bug-fix"
      task: |
        Fix the bugs in app.py:
        1. get_users() pagination is broken — page 1 should return the first 10 users, but it skips them.
        2. total_pages calculation doesn't handle remainders (e.g., 51 users with 10 per page should be 6 pages, not 5).
        3. search_users() is case-sensitive — searching "user" should match "User 1".
        Fix all three bugs. Do NOT add new features or refactor unrelated code.
      expected_fixes: |
        ["(page - 1) * per_page", ".lower()"]
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: python
        value: "file://assertions/bug_fix_check.py"
      - type: llm-rubric
        value: |
          The code changes should:
          1. Fix the pagination offset to use (page - 1) * per_page
          2. Fix total_pages to use ceiling division (math.ceil or equivalent)
          3. Make search case-insensitive
          4. NOT add unrelated changes or new features
          Rate the quality of the fix (focused, correct, minimal).
        threshold: 0.7

  # -------------------------------------------------------------------
  # Test 2: Add feature — retry logic with exponential backoff
  # -------------------------------------------------------------------
  - description: "Add retry decorator with exponential backoff to utils.py"
    vars:
      fixture: "python-add-feature"
      task: |
        Add a retry decorator to utils.py that:
        1. Retries a function up to `max_retries` times (default 3)
        2. Uses exponential backoff: wait 2^attempt seconds between retries
        3. Only retries on specified exception types (default: Exception)
        4. Logs each retry attempt
        5. Raises the last exception if all retries fail

        Add the decorator to the file and apply it to load_config() with max_retries=2.
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: llm-rubric
        value: |
          Check that the implementation:
          1. Has a retry decorator (function or class-based)
          2. Implements exponential backoff (2^attempt or similar)
          3. Accepts max_retries and exception parameters
          4. Is applied to load_config with max_retries=2
          5. Code is clean and follows the existing style in utils.py
        threshold: 0.7

  # -------------------------------------------------------------------
  # Test 3: Refactor — extract duplicated validation logic
  # -------------------------------------------------------------------
  - description: "Extract duplicated validation into reusable functions"
    vars:
      fixture: "python-refactor"
      task: |
        handlers.py has duplicated validation logic across handle_create_user,
        handle_update_user, and handle_create_order. Refactor to:
        1. Extract email validation into a validate_email() function
        2. Extract name validation into a validate_name() function
        3. Extract age validation into a validate_age() function
        4. Use these in all three handlers
        5. Do NOT change the behavior — same inputs should produce same outputs.
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: llm-rubric
        value: |
          Check that:
          1. Validation functions were extracted (validate_email, validate_name, validate_age)
          2. All three handlers use the extracted functions
          3. No duplicate validation code remains
          4. The external behavior is preserved (same return values)
          5. The code is cleaner and shorter than the original
        threshold: 0.7

  # -------------------------------------------------------------------
  # Test 4: Write tests for existing code
  # -------------------------------------------------------------------
  - description: "Write unit tests for calculator module"
    vars:
      fixture: "js-add-tests"
      task: |
        Write comprehensive unit tests for calculator.js. Create a file
        calculator.test.js using Jest/Node assert. Cover:
        1. Basic operations (add, subtract, multiply, divide)
        2. Edge cases (division by zero, negative numbers, zero)
        3. Power function with various exponents
        4. Factorial including edge cases (0, 1, negative)
        Write the test file, do NOT modify calculator.js.
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: llm-rubric
        value: |
          Check that:
          1. A test file was created (calculator.test.js or similar)
          2. Tests cover all 6 functions (add, subtract, multiply, divide, power, factorial)
          3. Edge cases are tested (division by zero, negative factorial, zero inputs)
          4. calculator.js was NOT modified
          5. Tests are well-structured and would pass against the implementation
        threshold: 0.7

  # -------------------------------------------------------------------
  # Test 5: Code generation from scratch
  # -------------------------------------------------------------------
  - description: "Generate a complete LRU cache implementation"
    vars:
      fixture: ""
      files: |
        {}
      task: |
        Create a file called lru_cache.py with a complete LRU cache implementation:
        1. Class LRUCache with __init__(capacity: int)
        2. get(key) -> value or -1 if not found
        3. put(key, value) -> None, evicts least recently used if at capacity
        4. Both get and put must be O(1) time complexity
        5. Use an OrderedDict or implement with a doubly-linked list + dict
        6. Add a __len__ method and a __contains__ method
        Include docstrings and type hints.
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: llm-rubric
        value: |
          Check that:
          1. lru_cache.py was created
          2. LRUCache class exists with get/put/len/contains methods
          3. O(1) operations (uses OrderedDict or linked list + dict)
          4. Eviction works correctly at capacity
          5. Has docstrings and type hints
          6. Code is clean, production-quality Python
        threshold: 0.7

  # -------------------------------------------------------------------
  # Test 6: Multi-file feature — add preferences to Flask app (medium)
  # -------------------------------------------------------------------
  - description: "Add user preferences endpoint to multi-file Flask app"
    vars:
      fixture: "flask-app"
      task: |
        Add a user preferences feature to this Flask app:
        1. Add a UserPreference model to models.py with fields: id, user_id (FK to users), key (string), value (string)
        2. Add API endpoints to routes.py:
           - GET /api/users/<user_id>/preferences — list all preferences for a user
           - PUT /api/users/<user_id>/preferences — set a preference (JSON body: {"key": "...", "value": "..."})
           - DELETE /api/users/<user_id>/preferences/<key> — delete a specific preference
        3. Add validation: key must be non-empty, user must exist
        4. Add tests in tests/test_preferences.py
        5. Make sure existing tests still pass
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: llm-rubric
        value: |
          Check that:
          1. UserPreference model was added to models.py with correct fields and FK
          2. All 3 preference endpoints were added (GET, PUT, DELETE)
          3. Validation exists for key and user existence
          4. Tests were written for the new endpoints
          5. Existing user routes were NOT broken
          6. Code follows the existing patterns in the codebase
        threshold: 0.7

  # -------------------------------------------------------------------
  # Test 7: Cross-file bug — root cause in a different module (hard)
  # -------------------------------------------------------------------
  - description: "Fix cross-module pricing bug (root cause analysis)"
    vars:
      fixture: "cross-file-bug"
      task: |
        The tests in test_orders.py are failing. Run the tests, find the root cause,
        and fix it. The bug is NOT in test_orders.py or orders.py — the tests and
        order logic are correct. The root cause is somewhere else.

        IMPORTANT: Fix the ROOT CAUSE, not the symptom. Do not modify the tests.
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: python
        value: "file://assertions/cross_file_fix.py"
      - type: llm-rubric
        value: |
          Check that:
          1. The fix is in pricing.py, specifically in calculate_discount()
          2. calculate_discount() now returns the discount AMOUNT (subtotal * discount_percent / 100), not the discounted price
          3. test_orders.py was NOT modified
          4. orders.py was NOT modified (or only minimally)
          5. The fix is minimal and focused on the root cause
        threshold: 0.7

  # ===================================================================
  # ARCHITECTURE & TRADE-OFF TESTS
  # ===================================================================

  # -------------------------------------------------------------------
  # Test 8: Architecture trade-off — improve a polling job queue (hard)
  # -------------------------------------------------------------------
  - description: "Improve job queue architecture with trade-off reasoning"
    vars:
      fixture: "architecture-tradeoff"
      task: |
        The job queue in app.py uses naive polling (queries the DB every second).
        Read the code, understand the problems listed in worker_loop's docstring,
        then improve the architecture.

        Requirements:
        1. Reduce unnecessary DB queries when no jobs are pending
        2. Add retry logic for failed jobs (max 3 retries with backoff)
        3. Add a callback/notification mechanism so callers can be notified when jobs complete
        4. Keep the existing API (submit_job, get_job_status, process_job) working
        5. Existing tests in test_app.py MUST still pass

        IMPORTANT: In your commit message, explain:
        - What approach you chose and WHY
        - What alternatives you considered and why you rejected them
        - What trade-offs your solution makes (e.g., complexity vs performance)
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: python
        value: "file://assertions/architecture_quality.py"
      - type: llm-rubric
        value: |
          Evaluate the ARCHITECTURE QUALITY of this solution:

          1. **Approach selection** (0.3): Did the agent choose a reasonable approach?
             Good: exponential backoff polling, threading.Event, callback registry
             Bad: added Redis/Celery/external deps for a simple queue, or no real improvement
          2. **Trade-off reasoning** (0.3): Did the agent explain WHY it chose this approach?
             Did it mention alternatives? Did it discuss complexity vs simplicity?
          3. **Backwards compatibility** (0.2): Do existing tests still work?
             Is the submit_job/get_job_status API preserved?
          4. **Proportionality** (0.2): Are the changes proportional to the problem?
             Not over-engineered (no microservice, no external queue) but meaningfully better.

          Rate overall architecture quality. An agent that makes the right trade-offs
          and explains them clearly should score higher than one that produces technically
          correct but unexplained or over-engineered code.
        threshold: 0.6

  # -------------------------------------------------------------------
  # Test 9: API migration with backwards compatibility (hard)
  # -------------------------------------------------------------------
  - description: "Migrate sync API client to async while maintaining backwards compat"
    vars:
      fixture: "api-migration"
      task: |
        Read ARCHITECTURE.md, client.py, and service.py. The codebase needs to
        migrate from sync to async HTTP calls, but with constraints:

        1. Add an AsyncAPIClient class to client.py with the same methods as APIClient
           but using async/await (use aiohttp or asyncio-compatible HTTP)
        2. The get_user_with_posts method should fetch user and posts IN PARALLEL
           (the sync version does them sequentially — this is the main performance win)
        3. The existing sync APIClient MUST remain working unchanged (other callers use it)
        4. Update service.py to support BOTH sync and async clients via dependency injection
        5. Add a clear migration path: document how callers should migrate from sync to async

        IMPORTANT: Read ARCHITECTURE.md for constraints. In your implementation:
        - Explain your approach to backwards compatibility
        - Note any trade-offs between stdlib-only vs adding aiohttp
        - Keep the code clean and the migration path obvious
    assert:
      - type: python
        value: "file://assertions/architecture_quality.py"
      - type: llm-rubric
        value: |
          Evaluate the MIGRATION QUALITY:

          1. **Backwards compatibility** (0.3): Is the sync APIClient untouched?
             Can existing callers keep working without changes?
          2. **Async design** (0.25): Does AsyncAPIClient properly use async/await?
             Does get_user_with_posts parallelize the two calls (asyncio.gather or similar)?
          3. **Dependency decision** (0.2): Did the agent make a reasonable choice about
             aiohttp vs stdlib? Did it explain the trade-off? (Either choice is valid
             if justified — stdlib keeps zero deps but is more code, aiohttp is cleaner
             but adds a dependency.)
          4. **Migration path** (0.15): Is it clear how to migrate? Are there docstrings,
             comments, or a migration guide explaining the transition?
          5. **Code quality** (0.1): Clean, readable, well-structured.

          A great solution makes the migration path obvious, keeps backwards compat
          clean, and explains the dependency trade-off clearly.
        threshold: 0.6

  # -------------------------------------------------------------------
  # Test 10: Performance optimization while preserving readability (hard)
  # -------------------------------------------------------------------
  - description: "Optimize data pipeline without sacrificing readability"
    vars:
      fixture: "performance-vs-readability"
      task: |
        pipeline.py has several performance issues documented in the code comments.
        Optimize the pipeline while respecting these constraints:

        1. The code MUST remain readable to junior developers who maintain it
        2. Every optimization must be proportional — don't add complexity for marginal gains
        3. clean_records() iterates the list 3 times — reduce to 1 pass
        4. aggregate_by_category() builds unnecessary intermediate lists — optimize
        5. monthly_trends() parses date strings for every record — find a cheaper way
        6. top_salespersons() sorts everything to get top N — use a more efficient approach
        7. All tests in test_pipeline.py MUST still pass

        IMPORTANT: For each optimization, add a brief comment explaining WHAT you
        changed and WHY it's faster. If you chose NOT to optimize something, explain why
        (readability trade-off, marginal gain, etc).
    assert:
      - type: python
        value: "file://assertions/code_quality.py"
      - type: python
        value: "file://assertions/architecture_quality.py"
      - type: llm-rubric
        value: |
          Evaluate the OPTIMIZATION QUALITY:

          1. **clean_records** (0.2): Was it reduced to a single pass? Is it still readable?
          2. **aggregate_by_category** (0.15): Were intermediate lists eliminated?
             (defaultdict or running totals are good approaches)
          3. **monthly_trends** (0.15): Was date parsing optimized?
             (String slicing r.date[:7] is the simplest, regex is OK, caching is overkill)
          4. **top_salespersons** (0.1): Was a more efficient approach used?
             (heapq.nlargest is ideal, but sorted() is fine if N is small — good agents
             will note this trade-off)
          5. **Readability preserved** (0.2): Is the optimized code STILL readable?
             Would a junior dev understand it? Over-optimized one-liners should score lower.
          6. **Explanatory comments** (0.1): Did the agent explain each optimization?
          7. **Tests pass** (0.1): Were existing behaviors preserved?

          The best solution is one where optimizations are obvious improvements that
          anyone can understand, not clever tricks. Prefer clear > fast when marginal.
        threshold: 0.6

  # ===================================================================
  # PHASE-13 NO-DEFER / GATE FIXTURES — ADR-015 §16 (deletion tests)
  # ===================================================================
  # These four tests probe the failure modes the ADR-015 redesign was
  # built to prevent. They use the synthetic provider because they
  # require orchestrator state + Postgres (gate_decisions) + Redis
  # (standin.decision events) the in-process agent_provider can't yet
  # surface. The assertion modules re-run the PRODUCTION validators
  # against the synthetic payloads so the eval stays deletion-test-
  # bound: removing a no-defer layer from the real code breaks the
  # assertion.

  # -------------------------------------------------------------------
  # Test 11: Stub introduction blocked — ADR-015 §8 4-layer no-defer.
  # -------------------------------------------------------------------
  - description: "Stub introduction blocked — no-defer stack fires"
    vars:
      fixture: "stub-introduction-blocked"
      synthetic_output_filename: "synthetic_output.json"
      task: |
        Add a `CounterfactualWorld.fork_from` method backed by a
        placeholder stub for now; we'll fill in the actual fork logic
        in Phase 1. Add `POST /api/counterfactual/start` that calls
        `fork_from` and returns the new world id.
    providers:
      - "file://providers/synthetic_provider.py"
    assert:
      - type: python
        value: "file://assertions/stub_introduction_blocked.py"

  # -------------------------------------------------------------------
  # Test 12: Design approval before dispatch — ADR-015 §2.
  # -------------------------------------------------------------------
  - description: "Design approval gate fires before builder dispatch"
    vars:
      fixture: "design-approval-required-before-dispatch"
      synthetic_output_filename: "synthetic_output.json"
      task: |
        Add a three-page checkout flow to the marketplace web app:
        cart review screen, shipping address form, and payment screen.
        Each page is its own route with its own React component.
    providers:
      - "file://providers/synthetic_provider.py"
    assert:
      - type: python
        value: "file://assertions/design_approval_required.py"

  # -------------------------------------------------------------------
  # Test 13: Sub-architect spawn — parent answers grill (ADR-015 §10).
  # -------------------------------------------------------------------
  - description: "Sub-architect spawn — parent architect answers grill"
    vars:
      fixture: "sub-architect-spawn-parent-answers-grill"
      synthetic_output_filename: "synthetic_output.json"
      task: |
        Rewrite the authentication, billing, and notifications
        subsystems across this monolith with consistent observability,
        retries with circuit breakers on every external call, and
        Kafka domain events.
    providers:
      - "file://providers/synthetic_provider.py"
    assert:
      - type: python
        value: "file://assertions/sub_architect_parent_grill.py"

  # -------------------------------------------------------------------
  # Test 14: Freeform standin decision logged — ADR-015 §6 + Phase 12.
  # -------------------------------------------------------------------
  - description: "Freeform standin decision logged across all three sinks"
    vars:
      fixture: "freeform-standin-decision-logged"
      synthetic_output_filename: "synthetic_output.json"
      task: |
        Add a "share trip" feature to the travel-planning app: a
        button on the itinerary view opens a modal with a shareable
        URL; viewing the URL while logged-out shows the itinerary
        read-only. Persist a share_token against the itinerary row.
    providers:
      - "file://providers/synthetic_provider.py"
    assert:
      - type: python
        value: "file://assertions/freeform_standin_decision_logged.py"
