services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-autoagent}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoagent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auto-agent:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://autoagent:changeme@postgres:5432/autoagent
      REDIS_URL: redis://redis:6379/0
      WORKSPACES_DIR: /workspaces
      TEAM_MEMORY_DATABASE_URL: ${TEAM_MEMORY_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "2020:2020"
    volumes:
      - workspaces:/workspaces
      - userdata:/data
      # Claude CLI auth is per-user — each auto-agent user pairs via
      # /settings/claude and their tokens land in /data/users/<id>/.claude/
      # (mounted via the `userdata` volume above). Code paths that don't have
      # a specific user in scope default-route through the fallback user's
      # vault (see agent/llm/__init__.py::get_provider). NO host bind-mount
      # of legacy ~/.claude — it would leak the operator's personal session
      # into all callers that forget to set home_dir.

  web-next:
    build:
      context: ./web-next
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://auto-agent:2020
      NODE_ENV: production
    depends_on:
      - auto-agent
    ports:
      - "3000:3000"

volumes:
  pgdata:
  redisdata:
  workspaces:
  userdata:
