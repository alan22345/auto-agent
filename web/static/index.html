<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Agent</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --orange: #db6d28;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
    }
    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .task-item {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 13px;
      border: 1px solid transparent;
    }
    .task-item:hover { background: rgba(255,255,255,0.04); }
    .task-item.selected { border-color: var(--accent); background: rgba(88,166,255,0.08); }
    .task-item .task-id { color: var(--text-muted); font-size: 11px; }
    .task-item .task-title { margin-top: 2px; word-break: break-word; }
    .task-item .task-status { font-size: 11px; margin-top: 4px; }

    .status-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-intake, .status-classifying, .status-queued { background: rgba(139,148,158,0.2); color: var(--text-muted); }
    .status-planning, .status-awaiting_approval, .status-awaiting_clarification { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .status-coding { background: rgba(88,166,255,0.2); color: var(--accent); }
    .status-pr_created, .status-awaiting_ci, .status-awaiting_review { background: rgba(219,109,40,0.2); color: var(--orange); }
    .status-done { background: rgba(63,185,80,0.2); color: var(--green); }
    .status-failed, .status-blocked { background: rgba(248,81,73,0.2); color: var(--red); }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .main-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .message {
      margin-bottom: 12px;
      max-width: 80%;
    }
    .message.user { margin-left: auto; }
    .message.system, .message.event { margin-right: auto; }
    .message-bubble {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .message.user .message-bubble { background: var(--accent); color: #fff; }
    .message.system .message-bubble { background: var(--surface); border: 1px solid var(--border); }
    .message.event .message-bubble { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.2); font-size: 12px; }
    .message.error .message-bubble { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--red); }
    .message-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* Markdown formatting inside bubbles */
    .message-bubble h1, .message-bubble h2, .message-bubble h3, .message-bubble h4 {
      margin: 8px 0 4px; font-weight: 600;
    }
    .message-bubble h1 { font-size: 16px; }
    .message-bubble h2 { font-size: 15px; color: var(--accent); }
    .message-bubble h3 { font-size: 14px; }
    .message-bubble h4 { font-size: 13px; color: var(--text-muted); }
    .message-bubble p { margin: 4px 0; }
    .message-bubble ul, .message-bubble ol { margin: 4px 0 4px 20px; }
    .message-bubble li { margin: 2px 0; }
    .message-bubble code {
      background: rgba(255,255,255,0.08); padding: 1px 5px;
      border-radius: 3px; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px;
    }
    .message-bubble pre {
      background: rgba(0,0,0,0.3); padding: 8px 10px; border-radius: 4px;
      overflow-x: auto; margin: 6px 0; font-size: 12px;
    }
    .message-bubble pre code { background: transparent; padding: 0; }
    .message-bubble strong { font-weight: 600; }
    .message-bubble em { font-style: italic; }
    .message-bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .message-bubble a { color: var(--accent); text-decoration: none; }
    .message-bubble a:hover { text-decoration: underline; }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .input-area input, .input-area textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
    }
    .input-area input:focus, .input-area textarea:focus { outline: none; border-color: var(--accent); }
    .input-area button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .input-area button:hover { opacity: 0.9; }
    .input-area button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* New task form */
    .new-task-form {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .new-task-form input, .new-task-form textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      margin-bottom: 6px;
      resize: none;
    }
    .new-task-form input:focus, .new-task-form textarea:focus { outline: none; border-color: var(--accent); }
    .new-task-form button {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      padding: 6px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Approval bar */
    .approval-bar {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: rgba(210,153,34,0.08);
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }
    .approval-bar .approve-btn { background: var(--green); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
    .approval-bar .reject-btn { background: var(--red); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
    .approval-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 12px; }
    .approval-bar input:focus { outline: none; border-color: var(--accent); }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Sidebar tabs */
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-tabs button {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .sidebar-tabs button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .sidebar-tabs button:hover { color: var(--text); }

    /* Freeform panel */
    .freeform-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .freeform-panel.visible { display: flex; }
    .task-list-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .task-list-panel.hidden { display: none; }

    .suggestion-item {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .suggestion-item .sug-title { font-weight: 600; margin-bottom: 2px; }
    .suggestion-item .sug-rationale { color: var(--text-muted); font-size: 11px; margin-bottom: 4px; }
    .suggestion-item .sug-meta { display: flex; gap: 6px; align-items: center; }
    .suggestion-item .sug-category {
      font-size: 10px; padding: 1px 6px; border-radius: 8px;
      background: rgba(88,166,255,0.15); color: var(--accent);
    }
    .suggestion-item .sug-priority {
      font-size: 10px; color: var(--text-muted);
    }
    .suggestion-item .sug-actions { margin-top: 6px; display: flex; gap: 4px; }
    .suggestion-item .sug-actions button {
      padding: 3px 10px; border: none; border-radius: 3px; font-size: 11px; cursor: pointer;
    }
    .sug-approve { background: var(--green); color: #fff; }
    .sug-reject { background: var(--red); color: #fff; }
    .sug-promote { background: var(--green); color: #fff; }
    .sug-revert { background: var(--orange); color: #fff; }

    .freeform-section { padding: 8px; overflow-y: auto; flex: 1; }
    .freeform-section h3 { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }

    .freeform-config-form {
      padding: 8px;
      border-top: 1px solid var(--border);
    }
    .freeform-config-form input, .freeform-config-form select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .freeform-config-form button {
      width: 100%;
      padding: 5px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .dev-task-item {
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .dev-task-item .dt-title { font-weight: 600; margin-bottom: 2px; }
    .dev-task-item .dt-status { font-size: 10px; color: var(--text-muted); }
    .dev-task-item .dt-actions { margin-top: 4px; display: flex; gap: 4px; }
    .dev-task-item .dt-actions button {
      padding: 2px 8px; border: none; border-radius: 3px; font-size: 10px; cursor: pointer;
    }

    /* ---------- Freeform v2: full-width main-area dashboard ---------- */

    /* Sidebar list of freeform repos (replaces the cramped form) */
    .ff-sidebar-action {
      padding: 10px 12px;
      margin: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      text-align: center;
      transition: all 0.15s;
    }
    .ff-sidebar-action:hover { border-color: var(--accent); color: var(--accent); }
    .ff-sidebar-action.selected { border-style: solid; border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.08); }

    .ff-sidebar-section {
      padding: 8px 12px 4px;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .ff-repo-card {
      padding: 10px 12px;
      margin: 2px 8px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      font-size: 13px;
    }
    .ff-repo-card:hover { background: rgba(255,255,255,0.04); }
    .ff-repo-card.selected { border-color: var(--accent); background: rgba(88,166,255,0.08); }
    .ff-repo-card .ff-repo-name { font-weight: 500; word-break: break-word; }
    .ff-repo-card .ff-repo-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
    .ff-repo-card .ff-status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .ff-repo-card .ff-status-dot.on { background: var(--green); }
    .ff-repo-card .ff-status-dot.off { background: var(--text-muted); }
    .ff-repo-card { position: relative; }
    .ff-repo-delete { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: var(--text-muted); font-size: 14px; line-height: 1; cursor: pointer; opacity: 0; transition: opacity 0.15s, color 0.15s; }
    .ff-repo-card:hover .ff-repo-delete { opacity: 1; }
    .ff-repo-delete:hover { color: var(--red, #f85149); background: rgba(248,81,73,0.1); }

    /* Main-area freeform dashboard */
    .freeform-main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      max-width: 100%;
    }
    .freeform-main.hidden { display: none; }
    .ff-page {
      max-width: 760px;
      margin: 0 auto;
    }
    .ff-page h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .ff-page .ff-page-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 28px;
    }
    .ff-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    .ff-section h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .ff-field {
      margin-bottom: 14px;
    }
    .ff-field:last-child { margin-bottom: 0; }
    .ff-field label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 500;
    }
    .ff-field .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .ff-input, .ff-select, .ff-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .ff-input:focus, .ff-select:focus, .ff-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .ff-textarea {
      resize: none;
      overflow: hidden;
      min-height: 80px;
      line-height: 1.5;
      /* Modern browsers: lets the box grow with content automatically */
      field-sizing: content;
    }

    /* Toggle switch */
    .ff-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
    }
    .ff-toggle-row + .ff-toggle-row { border-top: 1px solid var(--border); }
    .ff-toggle-row .toggle-info {
      flex: 1;
    }
    .ff-toggle-row .toggle-info .toggle-label {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }
    .ff-toggle-row .toggle-info .toggle-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .toggle-switch {
      position: relative;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-switch .slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444c56;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .slider {
      background: var(--green);
    }
    .toggle-switch input:checked + .slider::before {
      transform: translateX(16px);
    }

    /* Buttons */
    .ff-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .ff-btn:hover { opacity: 0.9; }
    .ff-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ff-btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .ff-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
    .ff-btn.danger { background: var(--red); }
    .ff-btn.success { background: var(--green); }
    .ff-button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ff-analysis-status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .po-running {
      color: var(--accent);
    }
    .po-queued {
      color: var(--yellow, #e8a838);
    }
    .po-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: po-spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes po-spin {
      to { transform: rotate(360deg); }
    }
    .subtask-bar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .subtask-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .subtask-progress-track {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .subtask-progress-fill {
      height: 100%;
      background: var(--green, #3fb950);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .subtask-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .subtask-item {
      font-size: 12px;
      color: var(--text-dim);
      padding: 2px 0;
    }
    .subtask-item.subtask-active {
      color: var(--accent);
      font-weight: 600;
    }
    .subtask-title {
      margin-left: 4px;
    }

    /* Suggestion cards in dashboard */
    .ff-suggestion {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
      background: var(--bg);
    }
    .ff-suggestion .ff-sug-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .ff-suggestion .ff-sug-rationale { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.4; }
    .ff-suggestion .ff-sug-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .ff-suggestion .ff-sug-pill {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      background: rgba(88,166,255,0.15); color: var(--accent); text-transform: uppercase; font-weight: 600;
    }
    .ff-suggestion .ff-sug-priority {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      background: rgba(210,153,34,0.15); color: var(--yellow);
      text-transform: uppercase; font-weight: 600;
    }
    .ff-suggestion .ff-sug-actions { display: flex; gap: 6px; }
    .ff-suggestion .ff-sug-actions button {
      padding: 5px 12px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: 500;
    }

    /* Recent task entry in dashboard */
    .ff-recent-task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .ff-recent-task:hover { background: rgba(255,255,255,0.03); }
    .ff-recent-task .ff-rt-title { flex: 1; word-break: break-word; }
    .ff-recent-task .ff-rt-id { color: var(--text-muted); font-size: 11px; }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      color: #fff;
      animation: toast-in 0.25s ease-out, toast-out 0.3s ease-in forwards;
      animation-delay: 0s, 2.7s;
      pointer-events: auto;
    }
    .toast-success { background: var(--green); }
    .toast-error { background: var(--red); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toast-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }

  </style>
</head>
<body>
  <div class="toast-container" id="toast-container"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span><span class="dot"></span> Auto-Agent</span>
      <span style="color: var(--text-muted); font-size: 12px;" id="task-count">0 tasks</span>
    </div>
    <div class="sidebar-tabs">
      <button class="active" onclick="switchTab('tasks')" id="tab-tasks">Tasks</button>
      <button onclick="switchTab('freeform')" id="tab-freeform">Freeform</button>
    </div>

    <!-- Tasks tab -->
    <div class="task-list-panel" id="tasks-panel">
      <div class="task-list" id="task-list"></div>
      <div class="new-task-form">
        <input type="text" id="new-title" placeholder="Task title...">
        <textarea id="new-desc" rows="2" placeholder="Description (optional)"></textarea>
        <input type="text" id="new-repo" placeholder="Repo name (optional)">
        <button id="create-task-btn" onclick="createTask()">Create Task</button>
      </div>
    </div>

    <!-- Freeform tab — sidebar list of freeform repos + actions -->
    <div class="freeform-panel" id="freeform-panel">
      <div class="freeform-section" id="freeform-content" style="padding:8px 0;">
        <div class="ff-sidebar-action" id="ff-action-build" onclick="selectFreeformView('build')">+ Build something new</div>
        <div class="ff-sidebar-action" id="ff-action-existing" onclick="selectFreeformView('existing')">+ Add to existing repo</div>

        <div class="ff-sidebar-section">Freeform Repos</div>
        <div id="ff-repo-list">
          <div class="empty-state" style="height:60px;font-size:12px;">No freeform repos yet</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- Tasks-tab main content -->
    <div id="tasks-main" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="main-header" id="main-header">Select a task or create one</div>
    <div id="subtask-bar" class="subtask-bar" style="display:none;"></div>
    <div class="chat-area" id="chat-area">
      <div class="empty-state">Messages and events will appear here</div>
    </div>
    <div class="approval-bar" id="approval-bar" style="display:none;">
      <span>Plan awaiting approval:</span>
      <input type="text" id="reject-feedback" placeholder="Feedback (if rejecting)...">
      <button id="approve-task-btn" class="approve-btn" onclick="approveTask()">Approve</button>
      <button id="reject-task-btn" class="reject-btn" onclick="rejectTask()">Reject</button>
    </div>
    <div class="approval-bar" id="clarification-bar" style="display:none;">
      <span>&#10067; Clarification needed:</span>
      <input type="text" id="clarification-input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')sendClarification()">
      <button class="approve-btn" onclick="sendClarification()">Answer</button>
    </div>
    <div class="approval-bar" id="done-bar" style="display:none;">
      <span>PR merged? Mark this task as complete:</span>
      <button id="mark-done-btn" class="approve-btn" onclick="markDone()">Mark Done</button>
    </div>
    <div class="task-actions" id="task-actions" style="display:none;padding:6px 16px;border-top:1px solid var(--border);gap:6px;">
      <button id="cancel-task-btn" onclick="cancelTask()" style="background:var(--yellow);color:#000;border:none;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;">Cancel</button>
      <button id="delete-task-btn" onclick="deleteTask()" style="background:var(--red);color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;">Delete</button>
    </div>
    <div class="input-area">
      <input type="text" id="msg-input" placeholder="Describe a task or send a message..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
    </div><!-- /#tasks-main -->

    <!-- Freeform-tab main content (full width dashboard) -->
    <div id="freeform-main" class="freeform-main hidden">
      <div id="freeform-main-content" class="ff-page">
        <div class="empty-state" style="margin-top:80px;">Select an option from the sidebar</div>
      </div>
    </div>
  </div>

  <script>
    let ws;
    let tasks = [];
    let selectedTaskId = null;
    let chatMessages = {}; // task_id -> [messages]

    function connect() {
      ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        handleMessage(data);
      };
      ws.onclose = () => {
        setTimeout(connect, 2000);
      };
    }

    let suggestions = [];           // currently-displayed pending suggestions for the selected repo
    let freeformTasks = [];          // recent freeform tasks (across all repos)
    let freeformConfigs = [];        // all freeform configs (one per repo)
    let currentTab = "tasks";
    let selectedFreeformView = null; // 'build' | 'existing' | { repoName: '...' }
    let poAnalysisRunning = new Set(); // repo names with analysis actively running
    let poAnalysisQueued = new Set();  // repo names waiting in queue

    // Cron schedule presets shown in the dropdown.
    const CRON_PRESETS = [
      { label: "Every 10 minutes", value: "*/10 * * * *" },
      { label: "Every 30 minutes", value: "*/30 * * * *" },
      { label: "Every hour", value: "0 * * * *" },
      { label: "Every 4 hours", value: "0 */4 * * *" },
      { label: "Daily at 9am", value: "0 9 * * *" },
      { label: "Weekly (Mon 9am)", value: "0 9 * * 1" },
    ];

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tab-tasks").classList.toggle("active", tab === "tasks");
      document.getElementById("tab-freeform").classList.toggle("active", tab === "freeform");
      document.getElementById("tasks-panel").classList.toggle("hidden", tab !== "tasks");
      document.getElementById("freeform-panel").classList.toggle("visible", tab === "freeform");
      // Swap the main area too
      document.getElementById("tasks-main").style.display = (tab === "tasks") ? "flex" : "none";
      document.getElementById("freeform-main").classList.toggle("hidden", tab !== "freeform");

      if (tab === "freeform") {
        loadFreeformConfigs();
        loadFreeformTasks();
      }
    }

    function loadFreeformConfigs() {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: "load_freeform_config" }));
    }

    function loadFreeformTasks() {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: "load_freeform_tasks" }));
    }

    function loadSuggestionsForRepo(repoName) {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: "load_suggestions", status: "pending", repo_name: repoName }));
    }

    /* ----- Sidebar list rendering ----- */

    function renderFreeformSidebar() {
      // Highlight active sidebar action
      document.getElementById("ff-action-build").classList.toggle(
        "selected", selectedFreeformView === "build");
      document.getElementById("ff-action-existing").classList.toggle(
        "selected", selectedFreeformView === "existing");

      const el = document.getElementById("ff-repo-list");
      if (!freeformConfigs || freeformConfigs.length === 0) {
        el.innerHTML = '<div class="empty-state" style="height:60px;font-size:12px;">No freeform repos yet</div>';
        return;
      }
      const sortedConfigs = [...freeformConfigs].sort((a, b) => {
        if (a.enabled !== b.enabled) return b.enabled - a.enabled;
        return (a.repo_name || "").localeCompare(b.repo_name || "");
      });
      el.innerHTML = sortedConfigs.map(cfg => {
        const isSelected = (selectedFreeformView && selectedFreeformView.repoName === cfg.repo_name);
        return `
        <div class="ff-repo-card ${isSelected ? 'selected' : ''}" onclick="selectFreeformRepo('${escAttr(cfg.repo_name)}')">
          <span class="ff-repo-delete" onclick="event.stopPropagation(); confirmDeleteRepo('${escAttr(cfg.repo_name)}')" title="Remove repo">&times;</span>
          <div class="ff-repo-name">${escHtml(cfg.repo_name || '(unnamed)')}</div>
          <div class="ff-repo-meta">
            <span class="ff-status-dot ${cfg.enabled ? 'on' : 'off'}"></span>
            ${cfg.enabled ? 'enabled' : 'disabled'}
            ${cfg.auto_approve_suggestions ? ' • auto-approve' : ''}
          </div>
        </div>
      `}).join("");
    }

    async function confirmDeleteRepo(repoName) {
      if (!confirm(`Remove ${repoName}? This will disable freeform mode and remove it from the dashboard. Existing tasks will not be deleted.`)) return;
      try {
        const res = await fetch(`/api/repos/${encodeURIComponent(repoName)}`, { method: "DELETE" });
        if (res.status === 409) {
          const data = await res.json();
          alert(data.detail || "Cannot delete: active tasks reference this repo.");
          return;
        }
        if (!res.ok) {
          const data = await res.json();
          alert(data.detail || "Failed to delete repo.");
          return;
        }
        freeformConfigs = freeformConfigs.filter(c => c.repo_name !== repoName);
        if (selectedFreeformView && selectedFreeformView.repoName === repoName) {
          selectedFreeformView = "existing";
          renderFreeformSidebar();
          renderFreeformAddExisting();
        } else {
          renderFreeformSidebar();
        }
      } catch (e) {
        alert("Error deleting repo: " + e.message);
      }
    }

    /* ----- Sidebar action / repo selection ----- */

    function selectFreeformView(view) {
      selectedFreeformView = view;
      renderFreeformSidebar();
      if (view === "build") renderFreeformBuildNew();
      else if (view === "existing") renderFreeformAddExisting();
    }

    function selectFreeformRepo(repoName) {
      selectedFreeformView = { repoName };
      renderFreeformSidebar();
      // Pre-fetch suggestions for this repo
      suggestions = [];
      loadSuggestionsForRepo(repoName);
      renderFreeformRepoDetail(repoName);
    }

    /* ----- Main-area views ----- */

    function renderFreeformBuildNew() {
      const el = document.getElementById("freeform-main-content");
      el.innerHTML = `
        <h1>Build something new</h1>
        <div class="ff-page-subtitle">
          Describe a project and auto-agent will create a new GitHub repo, scaffold the initial codebase, and (if you enable the loop) keep improving it on its own.
        </div>

        <div class="ff-section">
          <h2>Project description</h2>
          <div class="ff-field">
            <label>What do you want to build?</label>
            <textarea class="ff-textarea" id="cr-description" rows="4"
              placeholder="e.g. A Next.js todo app with dark mode, drag-and-drop, and local storage persistence"
              oninput="autoGrow(this)"></textarea>
            <div class="hint">Claude will pick a short repo name from this. Be specific about features you want in the first version.</div>
          </div>
          <div class="ff-field">
            <label>GitHub org (optional)</label>
            <input type="text" class="ff-input" id="cr-org"
              placeholder="Leave empty to use your personal account">
          </div>
        </div>

        <div class="ff-section">
          <h2>Options</h2>
          <div class="ff-toggle-row">
            <div class="toggle-info">
              <div class="toggle-label">Continuous improvement loop</div>
              <div class="toggle-desc">After scaffolding, the PO agent generates suggestions every 30 min and auto-approves them. The repo will keep improving on its own until you turn this off.</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="cr-loop" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="ff-button-row">
          <button id="create-repo-btn" class="ff-btn" onclick="submitCreateRepo()">Create &amp; Scaffold</button>
        </div>
      `;
    }

    function renderFreeformAddExisting() {
      const el = document.getElementById("freeform-main-content");
      el.innerHTML = `
        <h1>Add freeform to an existing repo</h1>
        <div class="ff-page-subtitle">
          Enable freeform mode on a repo that's already registered with auto-agent. The PO agent will analyze it on a schedule and generate improvement suggestions.
        </div>

        <div class="ff-section">
          <h2>Repo</h2>
          <div class="ff-field">
            <label>Repo name</label>
            <input type="text" class="ff-input" id="ae-repo"
              placeholder="e.g. cardamon or org/cardamon">
            <div class="hint">Must already be registered. The repo sync runs at startup; check the Tasks tab dropdown for the exact name.</div>
          </div>
          <div class="ff-field">
            <label>Dev branch</label>
            <input type="text" class="ff-input" id="ae-branch" value="dev">
            <div class="hint">PRs from freeform tasks will merge into this branch. Use <code>main</code> for greenfield repos.</div>
          </div>
        </div>

        <div class="ff-section">
          <h2>Analysis schedule</h2>
          <div class="ff-field">
            <label>How often should the PO analyze the repo?</label>
            <select class="ff-select" id="ae-cron">
              ${CRON_PRESETS.map(p => `<option value="${p.value}">${p.label}</option>`).join("")}
            </select>
          </div>
        </div>

        <div class="ff-section">
          <h2>Options</h2>
          <div class="ff-toggle-row">
            <div class="toggle-info">
              <div class="toggle-label">Auto-approve suggestions</div>
              <div class="toggle-desc">When the PO produces suggestions, automatically convert them into freeform tasks (no human click required). Capped at 5 active tasks per repo.</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="ae-auto">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="ff-button-row">
          <button class="ff-btn" onclick="submitAddExisting()">Enable Freeform</button>
        </div>
      `;
      // Default cron to weekly for existing repos (less aggressive than greenfield)
      document.getElementById("ae-cron").value = "0 9 * * 1";
    }

    function renderFreeformRepoDetail(repoName) {
      const cfg = freeformConfigs.find(c => c.repo_name === repoName);
      if (!cfg) {
        document.getElementById("freeform-main-content").innerHTML =
          `<div class="empty-state">Repo not found</div>`;
        return;
      }
      // Build cron preset options, marking the current value as selected,
      // and supporting custom values that aren't in the preset list.
      const presetMatch = CRON_PRESETS.find(p => p.value === cfg.analysis_cron);
      const cronOptions = CRON_PRESETS.map(p =>
        `<option value="${p.value}" ${p.value === cfg.analysis_cron ? 'selected' : ''}>${p.label}</option>`
      ).join("");
      const customCron = !presetMatch
        ? `<option value="${escAttr(cfg.analysis_cron)}" selected>Custom: ${escHtml(cfg.analysis_cron)}</option>`
        : "";

      const repoTasks = freeformTasks
        .filter(t => t.repo_name === repoName)
        .sort((a, b) => b.id - a.id)
        .slice(0, 10);

      document.getElementById("freeform-main-content").innerHTML = `
        <h1>${escHtml(repoName)}</h1>
        <div class="ff-page-subtitle">Freeform configuration and live activity for this repo.</div>

        <div class="ff-section">
          <h2>Status</h2>
          <div class="ff-toggle-row">
            <div class="toggle-info">
              <div class="toggle-label">Freeform mode enabled</div>
              <div class="toggle-desc">Master switch. When off, the PO loop stops and no new analysis runs.</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="rd-enabled" ${cfg.enabled ? 'checked' : ''}>
              <span class="slider"></span>
            </label>
          </div>
          <div class="ff-toggle-row">
            <div class="toggle-info">
              <div class="toggle-label">Auto-approve suggestions</div>
              <div class="toggle-desc">Automatically convert PO suggestions into freeform tasks. Capped at 5 active tasks per repo.</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="rd-auto" ${cfg.auto_approve_suggestions ? 'checked' : ''}>
              <span class="slider"></span>
            </label>
          </div>
          <div class="ff-toggle-row">
            <div class="toggle-info">
              <div class="toggle-label">Auto-start tasks</div>
              <div class="toggle-desc">Immediately start work on approved freeform tasks, bypassing the concurrency queue.</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="rd-autostart" ${cfg.auto_start_tasks ? 'checked' : ''}>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="ff-section">
          <h2>Configuration</h2>
          <div class="ff-field">
            <label>Dev branch</label>
            <input type="text" class="ff-input" id="rd-branch" value="${escAttr(cfg.dev_branch)}">
            <div class="hint">Freeform PRs auto-merge into this branch when CI passes.</div>
          </div>
          <div class="ff-field">
            <label>Analysis schedule</label>
            <select class="ff-select" id="rd-cron">
              ${customCron}${cronOptions}
            </select>
          </div>
        </div>

        <div class="ff-button-row">
          <button class="ff-btn" onclick="saveRepoConfig('${escAttr(repoName)}')">Save changes</button>
          <button class="ff-btn secondary" id="rd-analyze-btn" onclick="triggerAnalysisFor('${escAttr(repoName)}')"
            ${poAnalysisRunning.has(repoName) || poAnalysisQueued.has(repoName) ? 'disabled' : ''}>
            ${poAnalysisRunning.has(repoName)
              ? '<span class="po-spinner"></span> PO analysis running...'
              : poAnalysisQueued.has(repoName)
                ? '<span class="po-spinner"></span> Queued...'
                : 'Run PO analysis now'}
          </button>
        </div>
        <div id="rd-analysis-status" class="ff-analysis-status">
          ${poAnalysisRunning.has(repoName)
            ? '<span class="po-running">Analysis in progress...</span>'
            : poAnalysisQueued.has(repoName)
              ? '<span class="po-queued">Waiting for other analysis to finish...</span>'
              : cfg.last_analysis_at
                ? '<span class="po-last-run">Last analysis: ' + new Date(cfg.last_analysis_at).toLocaleString() + '</span>'
                : '<span class="po-last-run">No analysis run yet</span>'
          }
        </div>

        <div class="ff-section" style="margin-top:24px;">
          <h2>Pending suggestions</h2>
          <div id="rd-suggestions">
            <div class="empty-state" style="height:60px;font-size:12px;">Loading...</div>
          </div>
        </div>

        <div class="ff-section">
          <h2>Recent freeform tasks</h2>
          <div id="rd-recent-tasks">
            ${repoTasks.length === 0
              ? '<div class="empty-state" style="height:60px;font-size:12px;">No freeform tasks yet</div>'
              : repoTasks.map(t => `
                <div class="ff-recent-task" onclick="switchTab('tasks');selectTask(${t.id})">
                  <span class="status-badge status-${t.status}">${t.status}</span>
                  <span class="ff-rt-title">${escHtml(t.title)}</span>
                  <span class="ff-rt-id">#${t.id}</span>
                  ${t.pr_url ? `<a href="${escAttr(t.pr_url)}" target="_blank" style="color:var(--accent);font-size:11px;" onclick="event.stopPropagation()">PR</a>` : ''}
                </div>
              `).join("")
            }
          </div>
        </div>
      `;
      // If suggestions are already loaded (cached) render them now.
      renderRepoDetailSuggestions();
    }

    function renderRepoDetailSuggestions() {
      const el = document.getElementById("rd-suggestions");
      if (!el) return;
      if (suggestions.length === 0) {
        el.innerHTML = '<div class="empty-state" style="height:60px;font-size:12px;">No pending suggestions</div>';
        return;
      }
      el.innerHTML = suggestions.map(s => `
        <div class="ff-suggestion">
          <div class="ff-sug-title">${escHtml(s.title)}</div>
          <div class="ff-sug-rationale">${escHtml(s.rationale || s.description || '')}</div>
          <div class="ff-sug-meta">
            ${s.category ? `<span class="ff-sug-pill">${escHtml(s.category)}</span>` : ''}
            <span class="ff-sug-priority">P${s.priority || 3}</span>
          </div>
          <div class="ff-sug-actions">
            <button id="sug-approve-${s.id}" style="background:var(--green);color:#fff;" onclick="approveSuggestion(${s.id})">Approve</button>
            <button id="sug-reject-${s.id}" style="background:var(--red);color:#fff;" onclick="rejectSuggestion(${s.id})">Reject</button>
          </div>
        </div>
      `).join("");
    }

    /* ----- Utility helpers ----- */

    function showToast(message, type = "success") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function setButtonLoading(btn, loading, label) {
      if (!btn) return;
      if (loading) {
        btn._originalHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="po-spinner"></span> ' + (label || btn.textContent.trim());
      } else {
        btn.disabled = false;
        if (btn._originalHTML !== undefined) btn.innerHTML = btn._originalHTML;
        else if (label) btn.textContent = label;
      }
    }

    /** Register a one-shot WS message handler with automatic cleanup.
     *  `matcher(data)` returns "done"|"error"|falsy.  Calls `onDone`/`onError`
     *  accordingly, or cleans up silently after `timeoutMs`. */
    function onNextWsMessage(matcher, { onDone, onError, onTimeout, timeoutMs = 10000 } = {}) {
      function cleanup() { ws.removeEventListener("message", handler); clearTimeout(timer); }
      function handler(e) {
        let data;
        try { data = JSON.parse(e.data); } catch { return; }
        const result = matcher(data);
        if (result === "done")  { cleanup(); if (onDone)  onDone(data); }
        if (result === "error") { cleanup(); if (onError) onError(data); }
      }
      const timer = setTimeout(() => { cleanup(); if (onTimeout) onTimeout(); }, timeoutMs);
      ws.addEventListener("message", handler);
      return cleanup;
    }

    /* ----- Form submit helpers ----- */

    function submitCreateRepo() {
      const desc = document.getElementById("cr-description").value.trim();
      if (!desc) { alert("Describe what you want to build"); return; }
      const org = document.getElementById("cr-org").value.trim();
      // The continuous-improvement loop is enabled by default in create_repo.py;
      // when the toggle is off we send loop=false and the backend will create
      // the freeform config with auto_approve_suggestions=false.
      const loop = document.getElementById("cr-loop").checked;
      const btn = document.getElementById("create-repo-btn");
      setButtonLoading(btn, true, 'Creating repository... this may take up to 3 minutes');
      onNextWsMessage(
        (data) => {
          if (data.type === "repo_created") return "done";
          if (data.type === "error") return "error";
        },
        {
          onDone()    { setButtonLoading(btn, false); },
          onError()   { setButtonLoading(btn, false); },
          onTimeout() { setButtonLoading(btn, false); },
          timeoutMs: 200000,
        }
      );
      ws.send(JSON.stringify({ type: "create_repo", description: desc, org, loop }));
      document.getElementById("cr-description").value = "";
      document.getElementById("cr-org").value = "";
    }

    function submitAddExisting() {
      const repo = document.getElementById("ae-repo").value.trim();
      const branch = document.getElementById("ae-branch").value.trim() || "dev";
      const cron = document.getElementById("ae-cron").value;
      const auto = document.getElementById("ae-auto").checked;
      if (!repo) { alert("Enter a repo name"); return; }
      ws.send(JSON.stringify({
        type: "toggle_freeform",
        repo_name: repo,
        enabled: true,
        dev_branch: branch,
        analysis_cron: cron,
        auto_approve_suggestions: auto,
      }));
    }

    function saveRepoConfig(repoName) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        showToast("Connection lost — cannot save", "error");
        return;
      }
      const btn = document.querySelector(`button[onclick="saveRepoConfig('${CSS.escape(repoName)}')"]`)
                || document.querySelector('.ff-btn:not(.secondary)');
      if (btn) setButtonLoading(btn, true, "Save changes");
      const resetBtn = () => { if (btn) setButtonLoading(btn, false, "Save changes"); };
      const enabled = document.getElementById("rd-enabled").checked;
      const auto = document.getElementById("rd-auto").checked;
      const autostart = document.getElementById("rd-autostart").checked;
      const branch = document.getElementById("rd-branch").value.trim() || "dev";
      const cron = document.getElementById("rd-cron").value;
      onNextWsMessage(
        (data) => {
          if (data.type === "freeform_config_list") return "done";
          if (data.type === "error") return "error";
        },
        {
          onDone()  { resetBtn(); showToast("Saved", "success"); },
          onError(data) { resetBtn(); showToast(data.message || "Failed to save", "error"); },
          onTimeout() { resetBtn(); showToast("Save timed out — check your connection", "error"); },
        }
      );
      ws.send(JSON.stringify({
        type: "toggle_freeform",
        repo_name: repoName,
        enabled,
        dev_branch: branch,
        analysis_cron: cron,
        auto_approve_suggestions: auto,
        auto_start_tasks: autostart,
      }));
    }

    function triggerAnalysisFor(repoName) {
      ws.send(JSON.stringify({ type: "trigger_analysis", repo_name: repoName }));
      // Optimistically show pending state — the actual started/queued event
      // will update to the correct state once the server responds
      poAnalysisQueued.add(repoName);
      updatePoAnalysisUI(repoName);
    }

    function updatePoAnalysisUI(repoName) {
      // Update the button and status if we're viewing this repo's detail page
      if (!selectedFreeformView || selectedFreeformView.repoName !== repoName) return;
      const btn = document.getElementById("rd-analyze-btn");
      const status = document.getElementById("rd-analysis-status");
      const isRunning = poAnalysisRunning.has(repoName);
      const isQueued = poAnalysisQueued.has(repoName);
      if (btn) {
        if (isRunning) {
          btn.disabled = true;
          btn.innerHTML = '<span class="po-spinner"></span> PO analysis running...';
        } else if (isQueued) {
          btn.disabled = true;
          btn.innerHTML = '<span class="po-spinner"></span> Queued...';
        } else {
          btn.disabled = false;
          btn.innerHTML = 'Run PO analysis now';
        }
      }
      if (status) {
        if (isRunning) {
          status.innerHTML = '<span class="po-running">Analysis in progress...</span>';
        } else if (isQueued) {
          status.innerHTML = '<span class="po-queued">Waiting for other analysis to finish...</span>';
        } else {
          const cfg = freeformConfigs.find(c => c.repo_name === repoName);
          const ts = cfg && cfg.last_analysis_at;
          status.innerHTML = ts
            ? '<span class="po-last-run">Last analysis: ' + new Date(ts).toLocaleString() + '</span>'
            : '<span class="po-last-run">No analysis run yet</span>';
        }
      }
    }

    function handleSuggestionAction(id, action) {
      const label = action === "approve" ? "approved" : "rejected";
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        showToast(`Connection lost — cannot ${action} suggestion`, "error");
        return;
      }
      const idx = suggestions.findIndex(s => s.id === id);
      const removed = idx !== -1 ? suggestions.splice(idx, 1)[0] : null;
      renderRepoDetailSuggestions();
      onNextWsMessage(
        (data) => {
          if (data.type === "error") return "error";
          if (data.type === "system") return "done";
        },
        {
          onDone()  { showToast(`Suggestion ${label}`, "success"); },
          onError(data) {
            if (removed) { suggestions.splice(idx, 0, removed); renderRepoDetailSuggestions(); }
            showToast(data.message || `Failed to ${action} suggestion`, "error");
          },
        }
      );
      ws.send(JSON.stringify({ type: `${action}_suggestion`, suggestion_id: id }));
    }

    function approveSuggestion(id) { handleSuggestionAction(id, "approve"); }
    function rejectSuggestion(id)  { handleSuggestionAction(id, "reject"); }

    function promoteTask(id) {
      if (!confirm("Promote this change to main?")) return;
      ws.send(JSON.stringify({ type: "promote_task", task_id: id }));
    }

    function revertTask(id) {
      if (!confirm("Revert this change from dev?")) return;
      ws.send(JSON.stringify({ type: "revert_task", task_id: id }));
    }

    /* Auto-grow textareas (fallback for browsers without field-sizing: content) */
    function autoGrow(el) {
      el.style.height = "auto";
      el.style.height = (el.scrollHeight + 2) + "px";
    }

    function escAttr(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    function handleMessage(data) {
      switch (data.type) {
        case "task_list":
          tasks = data.tasks;
          renderTasks();
          renderSubtaskBar();
          break;
        case "suggestion_list":
          suggestions = data.suggestions || [];
          renderRepoDetailSuggestions();
          break;
        case "freeform_task_list":
          freeformTasks = data.tasks || [];
          // Re-render the repo detail view if it's currently shown so the
          // "Recent freeform tasks" section reflects the latest data.
          if (currentTab === "freeform" && selectedFreeformView && selectedFreeformView.repoName) {
            renderFreeformRepoDetail(selectedFreeformView.repoName);
          }
          break;
        case "freeform_config_list":
          freeformConfigs = data.configs || [];
          if (currentTab === "freeform") {
            renderFreeformSidebar();
            // Refresh the repo detail view if currently shown so the toggles
            // reflect the latest server state.
            if (selectedFreeformView && selectedFreeformView.repoName) {
              renderFreeformRepoDetail(selectedFreeformView.repoName);
            }
          }
          break;
        case "repo_created":
          // Refresh the freeform configs (a new one was just created)
          loadFreeformConfigs();
          loadFreeformTasks();
          // Switch to Tasks tab and select the freshly-created scaffold task
          if (data.task && data.task.id) {
            switchTab('tasks');
            selectedTaskId = data.task.id;
            renderTasks();
            renderChat();
          }
          break;
        case "history":
          // Load persisted history for a task
          const key = data.task_id;
          chatMessages[key] = (data.entries || []).map(e => ({
            type: "event",
            message: e.message ? `[${e.to_status}] ${e.message}` : `[${e.to_status}]`,
            time: e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : "",
          }));
          if (selectedTaskId === data.task_id) renderChat();
          break;
        case "event":
          addChat(data.task_id, "event", formatEvent(data.event_type, data.payload || {}));
          // Refresh subtask bar on subtask progress events
          if (data.event_type === "task.subtask_progress" && data.task_id) {
            // Refresh the task list so subtask data is up to date
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: "get_tasks" }));
            }
          }
          // Track PO analysis running/queued state
          if (data.event_type === "po.analysis_queued" && data.payload?.repo_name) {
            poAnalysisQueued.add(data.payload.repo_name);
            updatePoAnalysisUI(data.payload.repo_name);
          } else if (data.event_type === "po.analysis_started" && data.payload?.repo_name) {
            poAnalysisQueued.delete(data.payload.repo_name);
            poAnalysisRunning.add(data.payload.repo_name);
            updatePoAnalysisUI(data.payload.repo_name);
          } else if ((data.event_type === "po.suggestions_ready" || data.event_type === "po.analysis_failed") && data.payload?.repo_name) {
            poAnalysisRunning.delete(data.payload.repo_name);
            poAnalysisQueued.delete(data.payload.repo_name);
            updatePoAnalysisUI(data.payload.repo_name);
          }
          break;
        case "system":
          addChat(selectedTaskId, "system", data.message);
          break;
        case "user":
          addChat(selectedTaskId, "user", data.message);
          break;
        case "error":
          addChat(selectedTaskId, "error", data.message);
          break;
      }
    }

    function addChat(taskId, type, message) {
      const key = taskId || "_global";
      if (!chatMessages[key]) chatMessages[key] = [];
      chatMessages[key].push({ type, message, time: new Date().toLocaleTimeString() });
      if (key === "_global" || taskId === selectedTaskId) {
        renderChat();
      }
    }

    function renderTasks() {
      const el = document.getElementById("task-list");
      const count = document.getElementById("task-count");
      const active = tasks.filter(t => !["done", "failed"].includes(t.status));
      count.textContent = `${active.length} active / ${tasks.length} total`;

      // Sort: active tasks first, then by id descending (newest first)
      const statusOrder = {
        'awaiting_clarification': 0, 'awaiting_approval': 0, 'coding': 1, 'planning': 1,
        'awaiting_ci': 2, 'awaiting_review': 2, 'pr_created': 2,
        'intake': 3, 'classifying': 3, 'queued': 3, 'blocked': 4,
        'done': 5, 'failed': 5
      };
      const sorted = [...tasks].sort((a, b) => {
        const oa = statusOrder[a.status] ?? 4, ob = statusOrder[b.status] ?? 4;
        if (oa !== ob) return oa - ob;
        return b.id - a.id;
      });

      el.innerHTML = sorted.map(t => `
        <div class="task-item ${t.id === selectedTaskId ? 'selected' : ''}" onclick="selectTask(${t.id})">
          <div class="task-id">#${t.id} ${t.repo_name ? '(' + t.repo_name + ')' : ''}</div>
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-status">
            <span class="status-badge status-${t.status}">${t.status}</span>
            ${t.complexity ? `<span style="color:var(--text-muted);margin-left:4px;">${t.complexity}</span>` : ''}
          </div>
        </div>
      `).join("");

      // Show/hide approval and clarification bars.
      // Freeform tasks are fully autonomous: their plan is auto-reviewed and
      // the PR auto-merges, so we never want the human-action bars to appear.
      const selected = tasks.find(t => t.id === selectedTaskId);
      const isFreeform = selected && selected.freeform_mode;
      const showApproval = selected && selected.status === "awaiting_approval" && !isFreeform;
      document.getElementById("approval-bar").style.display = showApproval ? "flex" : "none";
      if (showApproval) {
        // Reset approve/reject buttons in case they were left in loading state
        setButtonLoading(document.getElementById("approve-task-btn"), false);
        setButtonLoading(document.getElementById("reject-task-btn"), false);
      }
      document.getElementById("clarification-bar").style.display =
        (selected && selected.status === "awaiting_clarification" && !isFreeform) ? "flex" : "none";
      document.getElementById("done-bar").style.display =
        (selected && selected.status === "awaiting_review" && !isFreeform) ? "flex" : "none";
      document.getElementById("task-actions").style.display =
        selected ? "flex" : "none";
    }

    function selectTask(id) {
      selectedTaskId = id;
      renderTasks();
      renderChat();

      const task = tasks.find(t => t.id === id);
      if (task) {
        let header = `#${task.id} — ${escHtml(task.title)}`;
        if (task.pr_url) header += ` <a href="${task.pr_url}" target="_blank" style="color:var(--accent);font-size:12px;">PR</a>`;
        document.getElementById("main-header").innerHTML = header;
      }

      // Load persisted history from server
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "load_history", task_id: id }));
      }
    }

    function renderSubtaskBar() {
      const el = document.getElementById("subtask-bar");
      if (!el) return;
      const task = tasks.find(t => t.id === selectedTaskId);
      if (!task || !task.subtasks || task.subtasks.length === 0) {
        el.style.display = "none";
        return;
      }
      const total = task.subtasks.length;
      const done = task.subtasks.filter(s => s.status === "done").length;
      const current = task.current_subtask;
      const pct = Math.round((done / total) * 100);
      el.style.display = "block";
      el.innerHTML = `
        <div class="subtask-header">Subtasks: ${done}/${total} complete</div>
        <div class="subtask-progress-track">
          <div class="subtask-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="subtask-list">
          ${task.subtasks.map((s, i) => {
            const icon = s.status === "done" ? "✅" : s.status === "running" ? "⚙️" : "⏳";
            const active = i === current && s.status === "running" ? "subtask-active" : "";
            return `<div class="subtask-item ${active}">${icon} <span class="subtask-title">${escHtml(s.title)}</span></div>`;
          }).join("")}
        </div>
      `;
    }

    function renderChat() {
      const el = document.getElementById("chat-area");
      const key = selectedTaskId || "_global";
      const msgs = [...(chatMessages["_global"] || []), ...(chatMessages[key] || [])];

      renderSubtaskBar();

      if (msgs.length === 0) {
        el.innerHTML = '<div class="empty-state">Messages and events will appear here</div>';
        return;
      }

      el.innerHTML = msgs.map(m => `
        <div class="message ${m.type}">
          <div class="message-bubble">${renderMarkdown(m.message)}</div>
          <div class="message-time">${m.time}</div>
        </div>
      `).join("");

      el.scrollTop = el.scrollHeight;
    }

    async function createTask() {
      const title = document.getElementById("new-title").value.trim();
      const description = document.getElementById("new-desc").value.trim();
      const repo_name = document.getElementById("new-repo").value.trim();
      if (!title) return;

      const btn = document.getElementById("create-task-btn");
      setButtonLoading(btn, true);

      if (ws && ws.readyState === WebSocket.OPEN) {
        onNextWsMessage(
          (data) => {
            if (data.type === "error") return "error";
            if (data.type === "task_list" || data.type === "system") return "done";
          },
          {
            onDone()    { setButtonLoading(btn, false); },
            onError()   { setButtonLoading(btn, false); },
            onTimeout() { setButtonLoading(btn, false); },
          }
        );
        ws.send(JSON.stringify({ type: "send_task", title, description, repo_name }));
      } else {
        // Fallback to REST API
        try {
          const resp = await fetch("/api/tasks", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, description, source: "manual", repo_name: repo_name || null }),
          });
          if (resp.ok) {
            const task = await resp.json();
            addChat(null, "system", `Task #${task.id} created: ${task.title}`);
          } else {
            addChat(null, "error", `Failed to create task: ${await resp.text()}`);
          }
        } finally {
          setButtonLoading(btn, false);
        }
      }
      document.getElementById("new-title").value = "";
      document.getElementById("new-desc").value = "";
      document.getElementById("new-repo").value = "";
    }

    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text) return;

      ws.send(JSON.stringify({ type: "send_message", message: text, task_id: selectedTaskId }));
      input.value = "";
    }

    function approveTask() {
      if (!selectedTaskId) return;
      const btn = document.getElementById("approve-task-btn");
      setButtonLoading(btn, true);
      onNextWsMessage(
        (data) => {
          if (data.type === "error") return "error";
          if (data.type === "task_list" || data.type === "system") return "done";
        },
        {
          onError()   { setButtonLoading(btn, false); },
          onTimeout() { setButtonLoading(btn, false); },
        }
      );
      ws.send(JSON.stringify({ type: "approve", task_id: selectedTaskId }));
    }

    function rejectTask() {
      if (!selectedTaskId) return;
      const btn = document.getElementById("reject-task-btn");
      setButtonLoading(btn, true);
      onNextWsMessage(
        (data) => {
          if (data.type === "error") return "error";
          if (data.type === "task_list" || data.type === "system") return "done";
        },
        {
          onError()   { setButtonLoading(btn, false); },
          onTimeout() { setButtonLoading(btn, false); },
        }
      );
      const feedback = document.getElementById("reject-feedback").value.trim();
      ws.send(JSON.stringify({ type: "reject", task_id: selectedTaskId, feedback }));
      document.getElementById("reject-feedback").value = "";
    }

    function sendClarification() {
      if (!selectedTaskId) return;
      const input = document.getElementById("clarification-input");
      const text = input.value.trim();
      if (!text) return;
      ws.send(JSON.stringify({ type: "send_message", message: text, task_id: selectedTaskId }));
      input.value = "";
    }

    async function cancelTask() {
      if (!selectedTaskId || !confirm("Cancel this task?")) return;
      const btn = document.getElementById("cancel-task-btn");
      setButtonLoading(btn, true);
      try {
        const resp = await fetch(`/api/tasks/${selectedTaskId}/cancel`, { method: "POST" });
        if (resp.ok) {
          addChat(selectedTaskId, "system", "Task cancelled.");
          showToast("Task cancelled", "success");
        } else {
          addChat(selectedTaskId, "error", `Failed to cancel: ${await resp.text()}`);
          showToast("Failed to cancel task", "error");
        }
      } finally {
        setButtonLoading(btn, false);
      }
    }

    async function markDone() {
      if (!selectedTaskId) return;
      const btn = document.getElementById("mark-done-btn");
      setButtonLoading(btn, true);
      try {
        const resp = await fetch(`/api/tasks/${selectedTaskId}/done`, { method: "POST" });
        if (resp.ok) {
          addChat(selectedTaskId, "system", "Task marked as done.");
          showToast("Task marked as done", "success");
        } else {
          addChat(selectedTaskId, "error", `Failed: ${await resp.text()}`);
          showToast("Failed to mark task as done", "error");
        }
      } finally {
        setButtonLoading(btn, false);
      }
    }

    async function deleteTask() {
      if (!selectedTaskId || !confirm("Delete this task permanently?")) return;
      const btn = document.getElementById("delete-task-btn");
      setButtonLoading(btn, true);
      try {
        const resp = await fetch(`/api/tasks/${selectedTaskId}`, { method: "DELETE" });
        if (resp.ok) {
          delete chatMessages[selectedTaskId];
          selectedTaskId = null;
          document.getElementById("main-header").textContent = "Select a task or create one";
          renderChat();
          ws.send(JSON.stringify({ type: "refresh" }));
          showToast("Task deleted", "success");
        } else {
          addChat(selectedTaskId, "error", `Failed to delete: ${await resp.text()}`);
          showToast("Failed to delete task", "error");
        }
      } finally {
        setButtonLoading(btn, false);
      }
    }

    function renderMarkdown(s) {
      // Escape HTML first
      let h = s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      // Code blocks (```...```)
      h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.trimEnd()}</code></pre>`);

      // Inline code
      h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');

      // Headers
      h = h.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Horizontal rule
      h = h.replace(/^---+$/gm, '<hr>');

      // Bold and italic
      h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');

      // Links [text](url)
      h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

      // Lists: group consecutive lines starting with -, *, or number.
      const lines = h.split('\n');
      const out = [];
      let inList = null; // 'ul' | 'ol' | null
      for (const line of lines) {
        const ulMatch = /^[-*]\s+(.+)$/.exec(line);
        const olMatch = /^\d+\.\s+(.+)$/.exec(line);
        if (ulMatch) {
          if (inList !== 'ul') { if (inList) out.push(`</${inList}>`); out.push('<ul>'); inList = 'ul'; }
          out.push(`<li>${ulMatch[1]}</li>`);
        } else if (olMatch) {
          if (inList !== 'ol') { if (inList) out.push(`</${inList}>`); out.push('<ol>'); inList = 'ol'; }
          out.push(`<li>${olMatch[1]}</li>`);
        } else {
          if (inList) { out.push(`</${inList}>`); inList = null; }
          out.push(line);
        }
      }
      if (inList) out.push(`</${inList}>`);
      h = out.join('\n');

      // Paragraphs: wrap remaining plain-text blocks, preserve newlines inside blocks
      return h.replace(/\n\n+/g, '<br><br>').replace(/\n/g, '<br>');
    }

    function formatEvent(eventType, payload) {
      const p = payload || {};
      switch (eventType) {
        case "task.created":
          return "📋 **Task created**";
        case "task.classified":
          return `🏷️ Classified as **${p.complexity || "unknown"}** (risk: ${p.risk_level || "?"})`;
        case "task.start_planning":
          return p.feedback ? "✏️ **Revising plan** based on feedback" : "🔍 **Planning started**";
        case "task.plan_ready":
          return `**Plan ready for review:**\n\n${p.plan || "No details"}`;
        case "task.approved":
          return "✅ **Plan approved** — starting coding";
        case "task.rejected":
          return `↩️ **Plan rejected** — revising\n\nFeedback: ${p.feedback || "none"}`;
        case "task.start_coding":
          return p.retry_reason ? `⚡ **Retrying coding** — ${p.retry_reason}` : "⚡ **Coding started**";
        case "task.review_complete":
          const approved = p.approved ? "✅ Approved" : "🔧 Changes requested and fixed";
          return `**Independent review:** ${approved}\n\n${(p.review || "").slice(0, 1000)}${p.pr_url ? "\n\n[View PR](" + p.pr_url + ")" : ""}`;
        case "task.ci_passed":
          return "✅ **CI passed** — awaiting review";
        case "task.ci_failed":
          return `❌ **CI failed** — retrying\n\n${p.reason || ""}`;
        case "task.dev_deployed":
          return `🚀 **Deployed to dev**\nBranch \`${p.branch || ""}\` deployed.\n${p.pr_url || ""}\n\nPlease review the changes and merge or request changes.${p.output ? "\n\n" + p.output.slice(-500) : ""}`;
        case "task.dev_deploy_failed":
          return `❌ **Dev deployment failed**\n${p.pr_url || ""}\n\n${p.output || "Unknown error"}`;
        case "task.review_comments_addressed":
          return `**Review comments addressed** — changes pushed.\n${p.pr_url || ""}${p.output ? "\n\n" + p.output.slice(0, 500) : ""}`;
        case "task.clarification_needed":
          return `❓ **Clarification needed:**\n\n${p.question || "Unknown question"}`;
        case "task.clarification_resolved":
          return "💬 Clarification resolved — resuming";
        case "task.done":
          return "🎉 **Task complete!**";
        case "task.failed":
          return `❌ **Task failed**\n\n${p.error || p.reason || "Unknown error"}`;
        case "task.blocked":
          return `🚫 **Task blocked** — ${p.error || "needs input"}`;
        case "task.subtask_progress": {
          const icon = p.status === "done" ? "✅" : "⚙️";
          return `${icon} **Subtask ${p.current}/${p.total}** — ${p.title} [${p.status}]`;
        }
        case "task.cleanup":
          return "🧹 Workspace cleaned up";
        case "task.deploy_preview":
          return "🚀 Deploying to dev environment...";
        case "po.analysis_queued":
          return `⏳ **PO Analysis queued** for ${p.repo_name || "repo"} (position ${p.position || "?"})`;
        case "po.analysis_started":
          return `🔄 **PO Analysis running** for ${p.repo_name || "repo"}...`;
        case "po.analysis_failed":
          return `❌ **PO Analysis failed** for ${p.repo_name || "repo"}${p.reason ? " — " + p.reason : ""}`;
        case "po.suggestions_ready":
          return `🧠 **PO Analysis complete** — ${p.count || 0} new suggestions for ${p.repo_name || "repo"}`;
        default:
          const detail = Object.keys(p).length > 0 ? JSON.stringify(p) : "";
          return `[${eventType}]${detail ? " " + detail : ""}`;
      }
    }

    function escHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    connect();
  </script>
</body>
</html>
